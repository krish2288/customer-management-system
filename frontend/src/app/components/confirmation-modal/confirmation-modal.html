@if (isOpen) {
  <div class="modal-backdrop" role="presentation" (click)="cancel()">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="deleteDialogTitle" (click)="$event.stopPropagation()">
      <div class="modal__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M9 3h6l1 2h4v2H4V5h4l1-2Zm-3 6h12l-.75 12H6.75L6 9Zm4 2v8h2v-8h-2Zm4 0v8h2v-8h-2Z" />
        </svg>
      </div>
      <h2 id="deleteDialogTitle">{{ title }}</h2>
      <p>{{ message }}</p>
      <div class="modal__actions">
        <button class="button button--muted" type="button" [disabled]="isProcessing" (click)="cancel()">
          {{ cancelText }}
        </button>
        <button class="button button--danger" type="button" [disabled]="isProcessing" (click)="confirm()">
          @if (isProcessing) {
            <span class="spinner spinner--light" aria-hidden="true"></span>
          }
          {{ confirmText }}
        </button>
      </div>
    </section>
  </div>
}
